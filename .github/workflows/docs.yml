# Build the MkDocs site and publish it to GitHub Pages.
#
# Deploys on every push to `master` (so the docs always reflect the default
# branch) and on manual dispatch. We intentionally do NOT deploy on tags: the
# `github-pages` environment's default protection rule only allows deployments
# from the default branch, so tag-triggered deploys are rejected.
#
# One-time setup: repo Settings → Pages → Build and deployment → Source =
# "GitHub Actions".
name: Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install mkdocs-material

      - name: Build site (strict)
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
