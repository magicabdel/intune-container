# Reusable CI: format, lint, test, build.
#
# Runs on every push to main and every PR, and is also called by the release
# workflow (workflow_call) so a tagged release can't ship without passing CI.
name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_call:

# Don't waste minutes on superseded commits of the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Caches ~/.cargo and ./target keyed on Cargo.lock; big speedup on reruns.
      - uses: Swatinem/rust-cache@v2

      # The GUI links against WebKitGTK/GTK at build time (tauri, webkit2gtk,
      # libsoup, libayatana-appindicator → glib-sys). Without these -dev
      # packages the build fails at `glib-sys` with "glib-2.0 was not found".
      - name: Install GUI system libraries (Tauri v2)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            build-essential pkg-config

      # tauri-build (build.rs) requires the compiled frontend at `frontend/dist`
      # to exist before any cargo step, so build it first.
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: Format
        run: cargo fmt --all --check

      # Deny warnings so the "zero clippy warnings" bar is enforced, not aspirational.
      # clippy caps dependency lints to `allow`, so this only gates our own code.
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Build (release)
        run: cargo build --release --locked
