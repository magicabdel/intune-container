# Release pipeline — triggered only by semver tags (e.g. v1.2.3).
#
# 1. `verify`  — runs the full CI workflow; nothing ships unless it passes.
# 2. `image`   — builds the derived container image (base + xvfb, from
#                Dockerfile) and pushes it to the GitHub Container Registry
#                (ghcr.io/<owner>/<repo>).
# 3. `bundle`  — builds the desktop app (GUI) with Tauri and uploads the Linux
#                bundles (.deb, .rpm, AppImage) to the GitHub Release.
# `image` and `bundle` run in parallel after `verify`.
#
# ── Required configuration ───────────────────────────────────────────────────
# ghcr.io and the GitHub Release both use the built-in GITHUB_TOKEN (see the
# `packages: write` / `contents: write` permissions on the jobs) — no extra
# secrets needed. Ensure the ghcr package's visibility is set as desired in the
# repo's Packages settings after the first push.
# ─────────────────────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Gate the release on the same checks as every PR (DRY via workflow_call).
  verify:
    uses: ./.github/workflows/ci.yml

  image:
    name: Build & push image (ghcr.io)
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercased automatically by metadata-action, as ghcr requires.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache via GitHub Actions cache backend — fast incremental builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bundle:
    name: Bundle (.deb · .rpm · AppImage)
    needs: verify
    runs-on: ubuntu-22.04 # build on the older glibc so the AppImage runs widely
    permissions:
      contents: write # create the release and upload the bundles
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # The GUI links against WebKitGTK/GTK; the AppImage also bundles them.
      - name: Install GUI system libraries (Tauri v2)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            build-essential pkg-config

      # tauri-action runs the frontend build (tauri.conf.json beforeBuildCommand
      # → npm install + build), which needs Node.
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Builds the bundles (bundle.targets "all" → deb, rpm, AppImage) and
      # attaches them to the Release for the tag that triggered this run.
      - name: Build & upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: "See CHANGELOG.md for the release notes."
          releaseDraft: false
          prerelease: false
