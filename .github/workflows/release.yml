# Release pipeline — triggered only by semver tags (e.g. v1.2.3).
#
# 1. `verify`  — runs the full CI workflow; nothing ships unless it passes.
# 2. `image`   — builds the derived container image (base + xvfb, from
#                Dockerfile) and pushes it to the GitHub Container Registry
#                (ghcr.io/<owner>/<repo>).
# 3. `cargo`   — publishes the crate to crates.io.
# `image` and `cargo` run in parallel after `verify`.
#
# ── Required configuration ───────────────────────────────────────────────────
# Secrets:
#   CARGO_REGISTRY_TOKEN  crates.io API token (for the `cargo` job)
# ghcr.io uses the built-in GITHUB_TOKEN (see the `packages: write` permission
# on the `image` job) — no extra secrets needed. Ensure the package's visibility
# is set as desired in the repo's Packages settings after the first push.
# ─────────────────────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Gate the release on the same checks as every PR (DRY via workflow_call).
  verify:
    uses: ./.github/workflows/ci.yml

  image:
    name: Build & push image (ghcr.io)
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercased automatically by metadata-action, as ghcr requires.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache via GitHub Actions cache backend — fast incremental builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cargo:
    name: Publish crate (crates.io)
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Fail fast if the tag and Cargo.toml version disagree, so we never publish
      # a crate whose version doesn't match the tag that triggered the release.
      - name: Check tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          echo "tag=$tag  crate=$crate"
          test "$tag" = "$crate" || { echo "::error::tag v$tag != Cargo.toml $crate"; exit 1; }

      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
