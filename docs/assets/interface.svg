<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" width="820" height="600" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="26%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#23c9b8" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#23c9b8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- window -->
  <rect x="6" y="6" width="808" height="588" rx="14" fill="#0b0e13" stroke="#28313f"/>
  <rect x="6" y="6" width="808" height="588" rx="14" fill="url(#glow)"/>

  <!-- header -->
  <line x1="6" y1="60" x2="814" y2="60" stroke="#1b232f"/>
  <!-- brand mark (hex) -->
  <path d="M34 20 L46 27 L46 41 L34 48 L22 41 L22 27 Z" fill="none" stroke="#23c9b8" stroke-width="1.6" stroke-linejoin="round"/>
  <path d="M34 27 L40 30.5 L34 34 L28 30.5 Z" fill="#23c9b8"/>
  <text x="60" y="39" fill="#e8edf4" font-size="14" font-weight="700" letter-spacing="0.5">INTUNE<tspan fill="#93a1b3" font-weight="400">·</tspan>CONTAINER</text>

  <!-- tabs -->
  <g font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="10.5" letter-spacing="1.4">
    <rect x="300" y="20" width="232" height="26" rx="13" fill="#11161f" stroke="#1b232f"/>
    <rect x="303" y="23" width="66" height="20" rx="10" fill="#1d2733"/>
    <text x="336" y="37" fill="#e8edf4" text-anchor="middle">CONSOLE</text>
    <text x="392" y="37" fill="#5e6b7c" text-anchor="middle">SHELL</text>
    <text x="447" y="37" fill="#5e6b7c" text-anchor="middle">BACKUP</text>
    <text x="497" y="37" fill="#5e6b7c" text-anchor="middle">LOGS</text>
  </g>

  <!-- status pill -->
  <rect x="700" y="20" width="96" height="26" rx="13" fill="#11161f" stroke="#23c9b8"/>
  <circle cx="716" cy="33" r="3.5" fill="#23c9b8"/>
  <text x="726" y="37" fill="#e8edf4" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="10.5" letter-spacing="1">RUNNING</text>

  <!-- containment core -->
  <g transform="translate(410,150)">
    <circle r="58" fill="#23c9b8" opacity="0.06"/>
    <path d="M0 -52 L45 -26 L45 26 L0 52 L-45 26 L-45 -26 Z" fill="#23c9b8" fill-opacity="0.05" stroke="#23c9b8" stroke-width="2.2" stroke-linejoin="round" opacity="0.9"/>
    <circle r="40" fill="none" stroke="#28313f" stroke-width="2" stroke-dasharray="1.5 8" opacity="0.7"/>
    <circle r="40" fill="none" stroke="#23c9b8" stroke-width="3.2" stroke-linecap="round" transform="rotate(-90)"/>
    <path d="M0 -16 L17 -7 L0 2 L-17 -7 Z" fill="#23c9b8" opacity="0.95"/>
    <path d="M-17 -7 L0 2 L0 22 L-17 13 Z" fill="#23c9b8" opacity="0.42"/>
    <path d="M17 -7 L0 2 L0 22 L17 13 Z" fill="#23c9b8" opacity="0.66"/>
  </g>

  <!-- state -->
  <text x="410" y="252" fill="#23c9b8" font-size="26" font-weight="700" text-anchor="middle">Running</text>

  <!-- primary + pair buttons -->
  <rect x="250" y="274" width="320" height="42" rx="12" fill="#23c9b8"/>
  <text x="410" y="300" fill="#06201d" font-size="14.5" font-weight="600" text-anchor="middle">Stop container</text>

  <rect x="250" y="326" width="153" height="40" rx="12" fill="none" stroke="#28313f"/>
  <text x="326" y="351" fill="#e8edf4" font-size="13.5" font-weight="500" text-anchor="middle">Open portal</text>
  <rect x="417" y="326" width="153" height="40" rx="12" fill="none" stroke="#28313f"/>
  <text x="493" y="351" fill="#e8edf4" font-size="13.5" font-weight="500" text-anchor="middle">Open Edge</text>

  <!-- identity card -->
  <rect x="250" y="384" width="320" height="60" rx="14" fill="#11161f" stroke="#1b232f"/>
  <circle cx="284" cy="414" r="19" fill="#23c9b8" fill-opacity="0.13"/>
  <text x="284" y="419" fill="#23c9b8" font-size="14" font-weight="600" text-anchor="middle">JR</text>
  <text x="316" y="409" fill="#e8edf4" font-size="14" font-weight="600">Jordan Rivera</text>
  <text x="316" y="427" fill="#5e6b7c" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11.5">jordan.rivera@example.com</text>

  <!-- system health card -->
  <rect x="250" y="456" width="320" height="124" rx="14" fill="#11161f" stroke="#1b232f"/>
  <text x="266" y="478" fill="#5e6b7c" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9.5" letter-spacing="2">SYSTEM HEALTH</text>
  <circle cx="270" cy="494" r="4" fill="#23c9b8"/>
  <text x="282" y="498" fill="#23c9b8" font-size="15" font-weight="600">All checks passing</text>
  <text x="554" y="497" fill="#5e6b7c" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9.5" letter-spacing="1.4" text-anchor="end">⟳ 4s ago</text>
  <line x1="266" y1="510" x2="554" y2="510" stroke="#1b232f"/>

  <g font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="12">
    <circle cx="270" cy="528" r="3.5" fill="#23c9b8"/>
    <text x="284" y="532" fill="#e8edf4">Registration</text>
    <text x="554" y="532" fill="#93a1b3" font-family="'Space Grotesk', sans-serif" font-size="12.5" text-anchor="end">device enrolled</text>

    <circle cx="270" cy="550" r="3.5" fill="#23c9b8"/>
    <text x="284" y="554" fill="#e8edf4">Identity broker</text>
    <text x="554" y="554" fill="#93a1b3" font-family="'Space Grotesk', sans-serif" font-size="12.5" text-anchor="end">active</text>

    <circle cx="270" cy="572" r="3.5" fill="#23c9b8"/>
    <text x="284" y="576" fill="#e8edf4">Compliance agent</text>
    <text x="554" y="576" fill="#93a1b3" font-family="'Space Grotesk', sans-serif" font-size="12.5" text-anchor="end">scheduled</text>
  </g>
</svg>
